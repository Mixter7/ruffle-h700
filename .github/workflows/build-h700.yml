name: Build Ruffle H700 ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Ruffle
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git curl build-essential pkg-config libssl-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build desktop
        run: |
          cargo build --release --package ruffle_desktop

      - name: Prepare artifact
        run: |
          mkdir -p out
          echo "Arquivos encontrados:"
          find target/release -maxdepth 2 -type f -executable -print

          if [ -f target/release/ruffle ]; then
            cp target/release/ruffle out/ruffle
          elif [ -f target/release/ruffle_desktop ]; then
            cp target/release/ruffle_desktop out/ruffle
          else
            echo "Nenhum executável encontrado!"
            exit 1
          fi

          chmod +x out/ruffle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruffle-h700-arm64-test1
          path: out/ruffle
