name: Build Ruffle H700 Debug Crash Trace

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    container:
      image: debian:bullseye

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            git curl ca-certificates build-essential pkg-config python3 \
            libssl-dev libasound2-dev libudev-dev \
            libfontconfig1-dev libxcb1-dev zlib1g-dev \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev \
            libpango1.0-dev libcairo2-dev \
            libc-bin file default-jre-headless

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use current branch code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          echo "Código que será compilado:"
          git log -1 --format="%H%n%ci%n%s"

          git rev-parse HEAD > /tmp/ruffle_revision.txt

          echo "Verificando alteração do backend H700..."
          grep -n "H700" render/wgpu/src/backend.rs || true

          if grep -q "H700 ADAPTER ENUMERATION" render/wgpu/src/backend.rs; then
            echo "OK: patch de diagnóstico encontrado."
          else
            echo "ERRO: o backend.rs modificado não foi encontrado."
            echo "Confirme que você salvou, fez commit e sincronizou a alteração."
            exit 1
          fi

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 \
            -sSf https://sh.rustup.rs | sh -s -- -y

          . "$HOME/.cargo/env"
          rustup show
          rustc --version
          cargo --version

      - name: Fetch dependencies
        run: |
          . "$HOME/.cargo/env"
          cargo fetch

      - name: Patch winit 0.30.13 XKB for H700
        run: |
          . "$HOME/.cargo/env"

          WINIT_SOURCE="$(find "$HOME/.cargo/registry/src" \
            -type d \
            -name 'winit-0.30.13' \
            | head -n 1)"

          if [ -z "$WINIT_SOURCE" ]; then
            echo "ERRO: winit 0.30.13 não encontrado."
            find "$HOME/.cargo/registry/src" -maxdepth 3 \
              -type d -name 'winit-*' -print || true
            exit 1
          fi

          echo "Fonte do winit:"
          echo "$WINIT_SOURCE"

          rm -rf third_party/winit
          mkdir -p third_party
          cp -a "$WINIT_SOURCE" third_party/winit
          chmod -R u+w third_party/winit

          XKB_FILE="third_party/winit/src/platform_impl/linux/common/xkb/mod.rs"

          if [ ! -f "$XKB_FILE" ]; then
            echo "ERRO: arquivo XKB do winit não encontrado."
            exit 1
          fi

          python3 - "$XKB_FILE" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")

          old = """    #[cfg(x11_platform)]
              pub fn set_keymap_from_x11(&mut self, xcb: *mut xcb_connection_t) {
                  let keymap = XkbKeymap::from_x11_keymap(&self.context, xcb, self.core_keyboard_id);
                  let state = keymap.as_ref().and_then(|keymap| XkbState::new_x11(xcb, keymap));
                  if keymap.is_none() || state.is_none() {
                      warn!("failed to update xkb keymap");
                  }
                  self.state = state;
                  self.keymap = keymap;
              }
          """

          new = """    #[cfg(x11_platform)]
              pub fn set_keymap_from_x11(&mut self, _xcb: *mut xcb_connection_t) {
                  eprintln!(
                      "H700: skipping xkb_x11_keymap_new_from_device to avoid libxkbcommon-x11 crash"
                  );

                  // Leave the XKB state/keymap empty. Winit already treats a missing
                  // key context as unavailable, while physical controls are supplied
                  // by PortMaster/gptokeyb.
                  self.state = None;
                  self.keymap = None;
              }
          """

          if old not in text:
              print("ERRO: bloco set_keymap_from_x11 esperado não foi encontrado.")
              pos = text.find("pub fn set_keymap_from_x11")
              if pos >= 0:
                  print(text[max(0, pos - 500):pos + 1200])
              raise SystemExit(1)

          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          print("OK: patch XKB H700 aplicado ao winit 0.30.13.")
          PY

          echo "Trecho após o patch:"
          grep -n -C 10 \
            "H700: skipping xkb_x11_keymap_new_from_device" \
            "$XKB_FILE"

      - name: Use local patched winit
        run: |
          python3 <<'PY'
          from pathlib import Path

          cargo = Path("Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          patch_line = 'winit = { path = "third_party/winit" }'

          if patch_line in text:
              print("Patch local do winit já presente.")
          elif "[patch.crates-io]" in text:
              text = text.replace(
                  "[patch.crates-io]",
                  "[patch.crates-io]\n" + patch_line,
                  1,
              )
              cargo.write_text(text, encoding="utf-8")
          else:
              text = (
                  text.rstrip()
                  + "\n\n[patch.crates-io]\n"
                  + patch_line
                  + "\n"
              )
              cargo.write_text(text, encoding="utf-8")

          print("Cargo.toml atualizado para usar third_party/winit.")
          PY

          . "$HOME/.cargo/env"

          echo "Verificando winit local selecionado:"
          cargo tree -i winit | head -n 60

          if ! cargo tree -i winit | grep -q "third_party/winit"; then
            echo "ERRO: Cargo não selecionou o winit local modificado."
            exit 1
          fi

      - name: Build native crash tracer
        run: |
          cat > /tmp/segvtrace.c <<'EOF'
          #define _GNU_SOURCE
          #include <execinfo.h>
          #include <signal.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>

          static void crash_handler(int sig, siginfo_t *info, void *context) {
              (void)context;

              const char *name = strsignal(sig);
              dprintf(STDERR_FILENO, "\n========== H700 NATIVE CRASH ==========\n");
              dprintf(STDERR_FILENO, "Signal: %d (%s)\n", sig, name ? name : "unknown");
              dprintf(STDERR_FILENO, "Fault address: %p\n", info ? info->si_addr : NULL);

              void *frames[128];
              int count = backtrace(frames, 128);
              dprintf(STDERR_FILENO, "Backtrace frames: %d\n", count);
              backtrace_symbols_fd(frames, count, STDERR_FILENO);

              dprintf(STDERR_FILENO, "=======================================\n");
              fsync(STDERR_FILENO);

              signal(sig, SIG_DFL);
              raise(sig);
          }

          __attribute__((constructor))
          static void install_crash_handler(void) {
              struct sigaction action;
              memset(&action, 0, sizeof(action));
              action.sa_sigaction = crash_handler;
              sigemptyset(&action.sa_mask);
              action.sa_flags = SA_SIGINFO | SA_RESETHAND;

              sigaction(SIGSEGV, &action, NULL);
              sigaction(SIGABRT, &action, NULL);
              sigaction(SIGBUS, &action, NULL);
              sigaction(SIGILL, &action, NULL);
              sigaction(SIGFPE, &action, NULL);

              dprintf(STDERR_FILENO, "H700: native crash tracer installed.\n");
          }
          EOF

          gcc -shared -fPIC -O0 -g \
            -o /tmp/libsegvtrace.so \
            /tmp/segvtrace.c \
            -ldl

          file /tmp/libsegvtrace.so
          ldd /tmp/libsegvtrace.so || true

      - name: Patch exact winit X11 create_window trace
        run: |
          WINDOW_FILE="third_party/winit/src/platform_impl/linux/x11/window.rs"

          if [ ! -f "$WINDOW_FILE" ]; then
            echo "ERRO: window.rs do winit não encontrado."
            exit 1
          fi

          python3 - "$WINDOW_FILE" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")

          old = """        // finally creating the window
                  let xwindow = {
                      let (x, y) = position.map_or((0, 0), Into::into);
                      let wid = leap!(xconn.xcb_connection().generate_id());
                      let result = xconn.xcb_connection().create_window(
                          depth,
                          wid,
                          parent,
                          x,
                          y,
                          dimensions.0.try_into().unwrap(),
                          dimensions.1.try_into().unwrap(),
                          0,
                          xproto::WindowClass::INPUT_OUTPUT,
                          visual,
                          &window_attributes,
                      );
                      leap!(leap!(result).check());

                      wid
                  };
          """

          new = """        // finally creating the window
                  let xwindow = {
                      eprintln!("========== H700 WINIT 1: entered X11 create_window block ==========");

                      let (x, y) = position.map_or((0, 0), Into::into);
                      eprintln!(
                          "========== H700 WINIT 2: geometry x={} y={} width={} height={} ==========",
                          x,
                          y,
                          dimensions.0,
                          dimensions.1
                      );

                      eprintln!("========== H700 WINIT 3: before generate_id ==========");
                      let wid = leap!(xconn.xcb_connection().generate_id());
                      eprintln!("========== H700 WINIT 4: generated window id={} ==========", wid);

                      eprintln!("========== H700 WINIT 5: before create_window call ==========");
                      let result = xconn.xcb_connection().create_window(
                          depth,
                          wid,
                          parent,
                          x,
                          y,
                          dimensions.0.try_into().unwrap(),
                          dimensions.1.try_into().unwrap(),
                          0,
                          xproto::WindowClass::INPUT_OUTPUT,
                          visual,
                          &window_attributes,
                      );
                      eprintln!("========== H700 WINIT 6: create_window call returned ==========");

                      let cookie = leap!(result);
                      eprintln!("========== H700 WINIT 7: result accepted; before cookie.check ==========");

                      leap!(cookie.check());
                      eprintln!("========== H700 WINIT 8: cookie.check passed ==========");

                      wid
                  };

                  eprintln!("========== H700 WINIT 9: X11 window block completed ==========");
          """

          if old not in text:
              print("ERRO: bloco exato de create_window não foi encontrado.")
              pos = text.find("// finally creating the window")
              if pos >= 0:
                  print(text[pos:pos + 1800])
              raise SystemExit(1)

          text = text.replace(old, new, 1)

          old_visual = """        if visual == x11rb::COPY_FROM_PARENT {
                      visual = leap!(leap!(xconn
                          .xcb_connection()
                          .get_window_attributes(xwindow as xproto::Window))
                      .reply())
                      .visual;
                  }
          """

          new_visual = """        if visual == x11rb::COPY_FROM_PARENT {
                      eprintln!("========== H700 WINIT 10: before get_window_attributes ==========");
                      visual = leap!(leap!(xconn
                          .xcb_connection()
                          .get_window_attributes(xwindow as xproto::Window))
                      .reply())
                      .visual;
                      eprintln!("========== H700 WINIT 11: get_window_attributes completed ==========");
                  }
          """

          if old_visual not in text:
              print("ERRO: bloco get_window_attributes não encontrado.")
              raise SystemExit(1)

          text = text.replace(old_visual, new_visual, 1)

          old_sync = """        // We never want to give the user a broken window, since by then, it's too late to handle.
                  let window = leap!(xconn.sync_with_server().map(|_| window));

                  Ok(window)
          """

          new_sync = """        // We never want to give the user a broken window, since by then, it's too late to handle.
                  eprintln!("========== H700 WINIT 12: before sync_with_server ==========");
                  let window = leap!(xconn.sync_with_server().map(|_| window));
                  eprintln!("========== H700 WINIT 13: sync_with_server completed ==========");

                  Ok(window)
          """

          if old_sync not in text:
              print("ERRO: bloco sync_with_server não encontrado.")
              raise SystemExit(1)

          text = text.replace(old_sync, new_sync, 1)

          path.write_text(text, encoding="utf-8")
          print("OK: rastreamento exato do create_window aplicado.")
          PY

          echo
          echo "Marcadores aplicados:"
          grep -n "H700 WINIT" "$WINDOW_FILE"

      - name: Build Ruffle debug
        run: |
          . "$HOME/.cargo/env"

          export RUSTFLAGS="-C force-frame-pointers=yes -C debuginfo=2 -C link-arg=-rdynamic -A dangerous_implicit_autorefs"
          export CARGO_PROFILE_DEV_DEBUG=2

          if cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop"'; then
            cargo build --package ruffle_desktop
          elif cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop_native"'; then
            cargo build --package ruffle_desktop_native
          else
            echo "Pacote desktop não identificado; tentando workspace."
            cargo build
          fi

      - name: Prepare debug artifact with recursive libraries
        run: |
          set -eu

          mkdir -p out/libs

          RUFFLE_FILE="$(find target/debug -maxdepth 2 \
            -type f -executable \
            \( -name 'ruffle' \
            -o -name 'ruffle_desktop' \
            -o -name 'ruffle_desktop_native' \) \
            | head -n 1)"

          if [ -z "$RUFFLE_FILE" ]; then
            echo "ERRO: executável debug do Ruffle não encontrado."
            exit 1
          fi

          cp "$RUFFLE_FILE" out/ruffle
          chmod +x out/ruffle

          cp /tmp/libsegvtrace.so out/libsegvtrace.so
          chmod +x out/libsegvtrace.so

          : > /tmp/lib_queue.txt
          : > /tmp/lib_seen.txt

          enqueue() {
            candidate="$1"

            if [ -f "$candidate" ] && ! grep -Fxq "$candidate" /tmp/lib_seen.txt; then
              echo "$candidate" >> /tmp/lib_queue.txt
            fi
          }

          is_forbidden_system_lib() {
            base="$(basename "$1")"

            case "$base" in
              libc.so.*|libpthread.so.*|libdl.so.*|librt.so.*|libm.so.*|libgcc_s.so.*|ld-linux-*.so.*|libmount.so.*|libblkid.so.*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          collect_ldd_paths() {
            binary="$1"

            ldd "$binary" 2>/dev/null \
              | awk '
                  /=> \/.*/ { print $3 }
                  /^[[:space:]]*\/.*\(/ { print $1 }
                ' \
              | while IFS= read -r dependency; do
                  [ -n "$dependency" ] && enqueue "$dependency"
                done
          }

          collect_ldd_paths "$RUFFLE_FILE"
          collect_ldd_paths /tmp/libsegvtrace.so

          for seed in \
            /usr/lib/aarch64-linux-gnu/libgtk-3.so.0 \
            /usr/lib/aarch64-linux-gnu/libgdk-3.so.0 \
            /usr/lib/aarch64-linux-gnu/libgdk_pixbuf-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libgio-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libgmodule-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libssl.so.1.1 \
            /usr/lib/aarch64-linux-gnu/libcrypto.so.1.1
          do
            enqueue "$seed"
          done

          index=1

          while :; do
            current="$(sed -n "${index}p" /tmp/lib_queue.txt)"

            if [ -z "$current" ]; then
              break
            fi

            index=$((index + 1))

            if grep -Fxq "$current" /tmp/lib_seen.txt; then
              continue
            fi

            echo "$current" >> /tmp/lib_seen.txt

            if is_forbidden_system_lib "$current"; then
              echo "Ignorando biblioteca crítica do sistema: $current"
              continue
            fi

            if [ ! -f "$current" ]; then
              echo "AVISO: biblioteca não encontrada: $current"
              continue
            fi

            echo "Copiando: $current"
            cp -L "$current" "out/libs/$(basename "$current")"

            collect_ldd_paths "$current"
          done

          rm -f \
            out/libs/libc.so.* \
            out/libs/libpthread.so.* \
            out/libs/libdl.so.* \
            out/libs/librt.so.* \
            out/libs/libm.so.* \
            out/libs/libgcc_s.so.* \
            out/libs/ld-linux-*.so.* \
            out/libs/libmount.so.* \
            out/libs/libblkid.so.*

          cp /tmp/ruffle_revision.txt out/revision.txt
          echo "debug-winit-0.30.13-xkb-noop-h700" > out/patch.txt

          file out/ruffle | tee out/info.txt
          ldd out/ruffle | tee -a out/info.txt || true

          echo
          echo "Arquivos do artifact:"
          ls -lh out
          ls -lh out/libs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruffle-h700-debug-crash-trace
          path: out/
