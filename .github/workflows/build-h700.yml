name: Build Ruffle 2023 H700 Patched

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    container:
      image: debian:bullseye

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            git curl ca-certificates build-essential pkg-config python3 \
            libssl-dev libasound2-dev libudev-dev \
            libfontconfig1-dev libxcb1-dev zlib1g-dev \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev \
            libpango1.0-dev libcairo2-dev \
            libc-bin file default-jre-headless

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Ruffle 2023 commit
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin --tags --force
          git checkout 7d23495

          echo "Commit selecionado:"
          git log -1 --format="%H%n%ci%n%s"

          echo "7d23495" > /tmp/ruffle_revision.txt

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 \
            -sSf https://sh.rustup.rs | sh -s -- -y

          . "$HOME/.cargo/env"

          rustup show
          rustc --version
          cargo --version

      - name: Show workspace packages
        run: |
          . "$HOME/.cargo/env"

          cargo metadata --no-deps --format-version 1 \
            | grep -o '"name":"[^"]*"' \
            | sort -u || true

      - name: Patch winit X11 input method
        run: |
          . "$HOME/.cargo/env"

          cargo fetch

          WINIT_DIR="$(find "$HOME/.cargo/registry/src" \
            -type d \
            -name 'winit-0.27.5' \
            | head -n 1)"

          if [ -z "$WINIT_DIR" ]; then
            echo "ERRO: winit 0.27.5 não foi encontrado."
            exit 1
          fi

          WINIT_FILE="$WINIT_DIR/src/platform_impl/linux/x11/mod.rs"

          if [ ! -f "$WINIT_FILE" ]; then
            echo "ERRO: arquivo X11 do winit não encontrado."
            exit 1
          fi

          echo "Arquivo do winit:"
          echo "$WINIT_FILE"

          cp "$WINIT_FILE" "$WINIT_FILE.original"

          python3 - "$WINIT_FILE" <<'PY'
          import pathlib
          import re
          import sys

          path = pathlib.Path(sys.argv[1])
          text = path.read_text()

          print("Ocorrências encontradas antes do patch:")
          for number, line in enumerate(text.splitlines(), 1):
              if "setlocale" in line or "Failed to open input method" in line:
                  print(f"{number}: {line}")

          original = text

          # Em ambientes X11 mínimos, usar a locale do sistema pode causar
          # falha na abertura do XIM. Forçamos a locale C diretamente.
          replacements = [
              (
                  r'libc::setlocale\(\s*libc::LC_CTYPE\s*,\s*[^;]+?\);',
                  'libc::setlocale(libc::LC_CTYPE, b"C\\\\0".as_ptr().cast());'
              ),
              (
                  r'\(xlib\.XSetLocaleModifiers\)\(\s*std::ptr::null\(\)\s*\)',
                  '(xlib.XSetLocaleModifiers)(b"@im=none\\\\0".as_ptr().cast())'
              ),
              (
                  r'\(xlib\.XSetLocaleModifiers\)\(\s*ptr::null\(\)\s*\)',
                  '(xlib.XSetLocaleModifiers)(b"@im=none\\\\0".as_ptr().cast())'
              ),
          ]

          for pattern, replacement in replacements:
              text, count = re.subn(
                  pattern,
                  replacement,
                  text,
                  count=1,
                  flags=re.DOTALL,
              )
              if count:
                  print(f"Patch aplicado ao padrão: {pattern}")

          if text == original:
              print("Nenhum padrão automático foi localizado.")
              print("Trecho próximo ao panic:")
              position = text.find("Failed to open input method")
              if position >= 0:
                  print(text[max(0, position - 900):position + 500])
              raise SystemExit(1)

          path.write_text(text)
          print("Patch X11/XIM aplicado com sucesso.")
          PY

          echo "Trechos após o patch:"
          grep -n -C 4 "setlocale\|XSetLocaleModifiers\|Failed to open input method" \
            "$WINIT_FILE" || true

      - name: Build Ruffle
        run: |
          . "$HOME/.cargo/env"

          export RUSTFLAGS="-A dangerous_implicit_autorefs"

          if cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop"'; then
            cargo build --release --package ruffle_desktop

          elif cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop_native"'; then
            cargo build --release --package ruffle_desktop_native

          else
            echo "Pacote desktop não identificado; tentando o workspace."
            cargo build --release
          fi

      - name: Prepare artifact
        run: |
          mkdir -p out/libs

          echo "Executáveis encontrados:"
          find target/release -maxdepth 2 \
            -type f -executable -print

          RUFFLE_FILE="$(find target/release -maxdepth 2 \
            -type f -executable \
            \( -name 'ruffle' \
            -o -name 'ruffle_desktop' \
            -o -name 'ruffle_desktop_native' \) \
            | head -n 1)"

          if [ -z "$RUFFLE_FILE" ]; then
            echo "Executável do Ruffle não encontrado."
            exit 1
          fi

          cp "$RUFFLE_FILE" out/ruffle
          chmod +x out/ruffle

          cp -L /usr/lib/aarch64-linux-gnu/libssl.so.1.1 \
            out/libs/ 2>/dev/null || true

          cp -L /usr/lib/aarch64-linux-gnu/libcrypto.so.1.1 \
            out/libs/ 2>/dev/null || true

          GTK_LIB="/usr/lib/aarch64-linux-gnu/libgtk-3.so.0"

          if [ ! -f "$GTK_LIB" ]; then
            echo "libgtk-3.so.0 não foi encontrada."
            exit 1
          fi

          copy_safe_library() {
            lib="$1"

            if [ ! -f "$lib" ]; then
              return
            fi

            case "$(basename "$lib")" in
              libc.so.*|libpthread.so.*|libdl.so.*|librt.so.*|libm.so.*|libgcc_s.so.*|ld-linux-*.so.*|libmount.so.*|libblkid.so.*)
                echo "Ignorando biblioteca do sistema: $lib"
                ;;
              *)
                echo "Copiando: $lib"
                cp -L "$lib" out/libs/ 2>/dev/null || true
                ;;
            esac
          }

          echo "Copiando GTK e dependências diretas..."

          ldd "$GTK_LIB" \
            | awk '/=> \// {print $3}' \
            | sort -u \
            | while read -r lib; do
                copy_safe_library "$lib"
              done

          cp -L "$GTK_LIB" out/libs/

          echo "Copiando dependências do executável..."

          ldd out/ruffle \
            | awk '/=> \// {print $3}' \
            | sort -u \
            | while read -r lib; do
                copy_safe_library "$lib"
              done

          rm -f \
            out/libs/libc.so.* \
            out/libs/libpthread.so.* \
            out/libs/libdl.so.* \
            out/libs/librt.so.* \
            out/libs/libm.so.* \
            out/libs/libgcc_s.so.* \
            out/libs/ld-linux-*.so.* \
            out/libs/libmount.so.* \
            out/libs/libblkid.so.*

          cp /tmp/ruffle_revision.txt out/revision.txt
          echo "winit-0.27.5-xim-patched" > out/patch.txt

          file out/ruffle | tee out/info.txt
          ldd out/ruffle | tee -a out/info.txt || true

          echo "Bibliotecas empacotadas:"
          ls -lh out/libs

          echo "Verificando bibliotecas proibidas:"

          if find out/libs -maxdepth 1 -type f \
            \( -name 'libc.so.*' \
            -o -name 'libpthread.so.*' \
            -o -name 'libdl.so.*' \
            -o -name 'librt.so.*' \
            -o -name 'libm.so.*' \
            -o -name 'libgcc_s.so.*' \
            -o -name 'ld-linux-*.so.*' \
            -o -name 'libmount.so.*' \
            -o -name 'libblkid.so.*' \) \
            | grep -q .; then
              echo "ERRO: bibliotecas críticas do sistema foram empacotadas."
              exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruffle-h700-2023-winit-patched
          path: out/
