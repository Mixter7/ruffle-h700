name: Build Ruffle 2023 H700 Recursive Libs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    container:
      image: debian:bullseye

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            git curl ca-certificates build-essential pkg-config python3 \
            libssl-dev libasound2-dev libudev-dev \
            libfontconfig1-dev libxcb1-dev zlib1g-dev \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev \
            libpango1.0-dev libcairo2-dev \
            libc-bin file default-jre-headless

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Ruffle 2023 commit
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin --tags --force
          git checkout 7d23495

          echo "Commit selecionado:"
          git log -1 --format="%H%n%ci%n%s"
          echo "7d23495" > /tmp/ruffle_revision.txt

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 \
            -sSf https://sh.rustup.rs | sh -s -- -y

          . "$HOME/.cargo/env"
          rustup show
          rustc --version
          cargo --version

      - name: Fetch dependencies
        run: |
          . "$HOME/.cargo/env"
          cargo fetch

      - name: Copy local winit 0.27.5
        run: |
          WINIT_SOURCE="$(find "$HOME/.cargo/registry/src" \
            -type d \
            -name 'winit-0.27.5' \
            | head -n 1)"

          if [ -z "$WINIT_SOURCE" ]; then
            echo "ERRO: winit 0.27.5 não encontrado."
            exit 1
          fi

          rm -rf third_party/winit
          mkdir -p third_party
          cp -a "$WINIT_SOURCE" third_party/winit
          chmod -R u+w third_party/winit

          test -f third_party/winit/Cargo.toml
          test -f third_party/winit/src/platform_impl/linux/x11/ime/mod.rs

      - name: Patch winit to continue without XIM
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path(
              "third_party/winit/src/platform_impl/linux/x11/ime/mod.rs"
          )
          text = path.read_text(encoding="utf-8")

          old = '''        } else {
                      Err(ImeCreationError::OpenFailure(inner.potential_input_methods))
                  }
          '''

          new = '''        } else {
                      eprintln!(
                          "H700: XIM unavailable; continuing without an input method: {:#?}",
                          inner.potential_input_methods
                      );

                      inner.is_destroyed = true;
                      Ok(Ime { xconn, inner })
                  }
          '''

          if old not in text:
              print("ERRO: trecho esperado do Ime::new não foi encontrado.")
              position = text.find("ImeCreationError::OpenFailure")
              if position >= 0:
                  print(text[max(0, position - 500):position + 500])
              raise SystemExit(1)

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          print("OK: winit agora continua sem XIM.")
          PY

      - name: Add local winit Cargo patch
        run: |
          python3 <<'PY'
          from pathlib import Path

          cargo = Path("Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          patch_line = 'winit = { path = "third_party/winit" }'

          if patch_line in text:
              print("Patch local do winit já presente.")
          elif "[patch.crates-io]" in text:
              text = text.replace(
                  "[patch.crates-io]",
                  "[patch.crates-io]\n" + patch_line,
                  1,
              )
              cargo.write_text(text, encoding="utf-8")
          else:
              text = (
                  text.rstrip()
                  + "\n\n[patch.crates-io]\n"
                  + patch_line
                  + "\n"
              )
              cargo.write_text(text, encoding="utf-8")

          print("Cargo.toml atualizado.")
          PY

      - name: Verify local winit
        run: |
          . "$HOME/.cargo/env"

          cargo tree -i winit | head -n 40

          if ! cargo tree -i winit | grep -q "third_party/winit"; then
            echo "ERRO: a cópia local do winit não foi selecionada."
            exit 1
          fi

      - name: Build Ruffle
        run: |
          . "$HOME/.cargo/env"

          export RUSTFLAGS="-A dangerous_implicit_autorefs"

          if cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop"'; then
            cargo build --release --package ruffle_desktop
          elif cargo metadata --no-deps --format-version 1 \
            | grep -q '"name":"ruffle_desktop_native"'; then
            cargo build --release --package ruffle_desktop_native
          else
            echo "Pacote desktop não identificado; tentando workspace."
            cargo build --release
          fi

      - name: Prepare artifact with recursive libraries
        run: |
          set -eu

          mkdir -p out/libs

          RUFFLE_FILE="$(find target/release -maxdepth 2 \
            -type f -executable \
            \( -name 'ruffle' \
            -o -name 'ruffle_desktop' \
            -o -name 'ruffle_desktop_native' \) \
            | head -n 1)"

          if [ -z "$RUFFLE_FILE" ]; then
            echo "ERRO: executável do Ruffle não encontrado."
            exit 1
          fi

          cp "$RUFFLE_FILE" out/ruffle
          chmod +x out/ruffle

          : > /tmp/lib_queue.txt
          : > /tmp/lib_seen.txt

          enqueue() {
            candidate="$1"

            if [ -f "$candidate" ] && ! grep -Fxq "$candidate" /tmp/lib_seen.txt; then
              echo "$candidate" >> /tmp/lib_queue.txt
            fi
          }

          is_forbidden_system_lib() {
            base="$(basename "$1")"

            case "$base" in
              libc.so.*|libpthread.so.*|libdl.so.*|librt.so.*|libm.so.*|libgcc_s.so.*|ld-linux-*.so.*|libmount.so.*|libblkid.so.*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          collect_ldd_paths() {
            binary="$1"

            ldd "$binary" 2>/dev/null \
              | awk '
                  /=> \/.*/ { print $3 }
                  /^[[:space:]]*\/.*\(/ { print $1 }
                ' \
              | while IFS= read -r dependency; do
                  [ -n "$dependency" ] && enqueue "$dependency"
                done
          }

          collect_ldd_paths "$RUFFLE_FILE"

          for seed in \
            /usr/lib/aarch64-linux-gnu/libgtk-3.so.0 \
            /usr/lib/aarch64-linux-gnu/libgdk-3.so.0 \
            /usr/lib/aarch64-linux-gnu/libgdk_pixbuf-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libgio-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libgmodule-2.0.so.0 \
            /usr/lib/aarch64-linux-gnu/libssl.so.1.1 \
            /usr/lib/aarch64-linux-gnu/libcrypto.so.1.1
          do
            enqueue "$seed"
          done

          index=1

          while :; do
            current="$(sed -n "${index}p" /tmp/lib_queue.txt)"

            if [ -z "$current" ]; then
              break
            fi

            index=$((index + 1))

            if grep -Fxq "$current" /tmp/lib_seen.txt; then
              continue
            fi

            echo "$current" >> /tmp/lib_seen.txt

            if is_forbidden_system_lib "$current"; then
              echo "Ignorando biblioteca crítica do sistema: $current"
              continue
            fi

            if [ ! -f "$current" ]; then
              echo "AVISO: biblioteca não encontrada: $current"
              continue
            fi

            echo "Copiando: $current"
            cp -L "$current" "out/libs/$(basename "$current")"

            collect_ldd_paths "$current"
          done

          rm -f \
            out/libs/libc.so.* \
            out/libs/libpthread.so.* \
            out/libs/libdl.so.* \
            out/libs/librt.so.* \
            out/libs/libm.so.* \
            out/libs/libgcc_s.so.* \
            out/libs/ld-linux-*.so.* \
            out/libs/libmount.so.* \
            out/libs/libblkid.so.*

          cp /tmp/ruffle_revision.txt out/revision.txt
          echo "winit-0.27.5-no-xim-recursive-libs" > out/patch.txt

          file out/ruffle | tee out/info.txt
          ldd out/ruffle | tee -a out/info.txt || true

          echo
          echo "Bibliotecas empacotadas:"
          ls -lh out/libs

          echo
          echo "Verificando bibliotecas essenciais:"

          for required in \
            libgtk-3.so.0 \
            libgdk-3.so.0 \
            libssl.so.1.1 \
            libcrypto.so.1.1
          do
            if [ ! -f "out/libs/$required" ]; then
              echo "ERRO: $required não foi empacotada."
              exit 1
            fi

            echo "OK: $required"
          done

          echo
          echo "Total de bibliotecas:"
          find out/libs -maxdepth 1 -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruffle-h700-2023-no-xim-recursive-libs
          path: out/
