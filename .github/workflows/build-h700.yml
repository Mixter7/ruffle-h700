name: Build Ruffle H700 ARM64 Debian 11

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bullseye

    steps:
      - name: Install system deps
        run: |
          apt update
          apt install -y git curl build-essential pkg-config ca-certificates \
            libssl-dev libasound2-dev libudev-dev libfontconfig1-dev \
            libxcb1-dev zlib1g-dev file ldd

      - name: Checkout Ruffle
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Build Ruffle Desktop
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --package ruffle_desktop

      - name: Prepare artifact
        run: |
          mkdir -p out
          echo "Arquivos encontrados:"
          find target/release -maxdepth 2 -type f -executable -print

          if [ -f target/release/ruffle ]; then
            cp target/release/ruffle out/ruffle
          elif [ -f target/release/ruffle_desktop ]; then
            cp target/release/ruffle_desktop out/ruffle
          else
            echo "Nenhum executável encontrado!"
            exit 1
          fi

          chmod +x out/ruffle
          file out/ruffle > out/info.txt
          ldd out/ruffle >> out/info.txt || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruffle-h700-debian11-glibc231
          path: out/
